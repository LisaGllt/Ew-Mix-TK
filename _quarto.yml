project:
  type: book

book:
  title: "**Toxic cocktails in our soils** - Unravelling the effect of a fungicide and insecticide mixture on earthworm growth and reproduction
"
  subtitle: "Git repository"
  author:
    - name: "Lisa Gollot"
      orcid: ""
      affiliations:
        - name: "Université Paris-Saclay, INRAE, AgroParisTech, UMR 1402 ECOSYS"
          department: "Sol&Tox"
        - name: "Ineris"
          department: "TEAM"
  date: "6/25/2024"
  chapters:
    - index.qmd
    - quarto/A_Earthworm_culture.qmd
    - part: quarto/B_TK/B_TK_EPX_IMD.qmd
      chapters:
        - quarto/B_TK/BA_TK_IMD.qmd
        - quarto/B_TK/BA_TK_EPX.qmd
    - part: quarto/C_TD_Single/C_TD_EPX_IMD_single.qmd
      chapters: 
        - quarto/C_TD_Single/CA_Preliminary_tests.qmd
        - quarto/C_TD_Single/CB_Effect_single.qmd
    - part: quarto/D_TD_Mix/D_TD_EPX_IMD_mix.qmd
      chapters:
        - quarto/D_TD_Mix/DA_How_to_study_mixture.qmd
        - quarto/D_TD_Mix/DB_Effect_cocoons_mix_design.qmd
        - quarto/D_TD_Mix/DC_Effect_cocoons_mix_power.qmd
        - quarto/D_TD_Mix/DD_Effect_cocoons_mix_analysis_Autumn2024.qmd
        - quarto/D_TD_Mix/DE_Effect_cocoons_mix_analysis_Spring2025.qmd
        - quarto/D_TD_Mix/DF_Effect_cocoons_mix_analysis_otherEndpoints.qmd
    - quarto/references.qmd
  navbar:
    right:
      - icon: github
        href: https://github.com/LisaGllt/Ew-Growth-IdVar

bibliography: references/references.bib # ne pas exporter toute la bibliothèse juste la collection PhD
csl: references/apa.csl
execute:
  cache: true
  freeze: auto
execute-dir: project
format:
  html:
    code-fold: true
    code-tools: true
    code-block-bg: true
    highlight-style: appearance/lightnord.theme
    code-block-border-left: "#E5E9F0"
    code-overflow: wrap
    code-annotations: select
    theme:
      - cosmo
      - appearance/html_css.scss

editor: 
    markdown:
      canonical: true

